<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TARDIS Talk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap');
      
      html {
        background: #000;
      }

      body {
        font-family: 'Share Tech Mono', monospace;
        background-color: #000;
        color: #fff;
        overflow-x: hidden;
        overflow-y: auto;
      }
      
      /* TARDIS Hum Animation */
      @keyframes pulse-light {
        0%, 100% { opacity: 0.8; box-shadow: 0 0 20px #fff; }
        50% { opacity: 1; box-shadow: 0 0 40px #fff, 0 0 80px #00aaff; }
      }

      @keyframes scan-line {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      /* TARDIS Materialization Effect */
      @keyframes materialize {
        0% { opacity: 0; transform: scale(0.95); filter: blur(10px); }
        10% { opacity: 0.4; transform: scale(0.98); filter: blur(5px); }
        20% { opacity: 0.1; }
        30% { opacity: 0.5; }
        40% { opacity: 0.2; }
        50% { opacity: 0.7; transform: scale(1); filter: blur(0px); }
        80% { opacity: 0.7; }
        90% { opacity: 0.3; filter: blur(4px); }
        100% { opacity: 0; transform: scale(0.95); filter: blur(10px); }
      }

      .animate-materialize {
        animation: materialize 12s ease-in-out forwards;
      }

      .crt-overlay {
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }

      :root {
        --mobile-dock-height: 76px;
      }

      .mobile-status-bar,
      .mobile-contact-rail,
      .mobile-tab-panel,
      .mobile-bottom-dock,
      .mobile-incoming-screen,
      .mobile-active-call-screen {
        display: none;
      }

      button, input, textarea {
        -webkit-tap-highlight-color: transparent;
      }

      @keyframes incoming-vibrate {
        0%, 100% { transform: translate3d(0, 0, 0); }
        10%, 30%, 50%, 70%, 90% { transform: translate3d(-2px, 1px, 0); }
        20%, 40%, 60%, 80% { transform: translate3d(2px, -1px, 0); }
      }

      @keyframes mobile-wave {
        0%, 100% { transform: scaleY(0.28); opacity: 0.55; }
        50% { transform: scaleY(1); opacity: 1; }
      }

      @media (min-width: 768px) and (max-width: 1024px) {
        .tardis-main-frame { max-width: 58rem !important; padding: 2rem 1rem !important; }
        .tardis-rotor { width: 18rem !important; height: 18rem !important; }
        .desktop-panels { max-height: 42vh; overflow-y: auto; }
      }

      @media (max-width: 767px) {
        html, body, #root {
          width: 100%;
          min-height: 100%;
          height: auto;
          overflow-x: hidden;
          overflow-y: auto;
        }
        body {
          overscroll-behavior-y: contain;
          -webkit-overflow-scrolling: touch;
          touch-action: pan-y;
        }
        .tardis-app-shell {
          min-height: 100dvh !important;
          height: auto !important;
          justify-content: flex-start !important;
          align-items: stretch !important;
          overflow-x: hidden !important;
          overflow-y: visible !important;
          padding-bottom: calc(var(--mobile-dock-height) + env(safe-area-inset-bottom));
          touch-action: pan-y;
        }
        .desktop-title,
        .desktop-panels {
          display: none !important;
        }
        .mobile-status-bar {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          z-index: 36;
          display: grid;
          grid-template-columns: 0.65fr 1fr 1.25fr;
          gap: 0.4rem;
          padding: calc(0.58rem + env(safe-area-inset-top)) 0.85rem 0.58rem;
          color: rgba(186, 230, 253, 0.95);
          background: linear-gradient(180deg, rgba(0, 20, 45, 0.9), rgba(0,0,0,0.26));
          border-bottom: 1px solid rgba(34, 211, 238, 0.18);
          backdrop-filter: blur(14px);
          font-size: clamp(0.58rem, 2.45vw, 0.72rem);
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }
        .mobile-status-bar span {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .tardis-main-frame {
          max-width: none !important;
          min-height: 100dvh !important;
          height: auto !important;
          padding: calc(3.15rem + env(safe-area-inset-top)) 0.75rem calc(var(--mobile-dock-height) + env(safe-area-inset-bottom) + 1.4rem) !important;
          justify-content: flex-start !important;
          gap: 0.55rem;
          overflow: visible !important;
          transform: translateZ(0);
          -webkit-overflow-scrolling: touch;
          touch-action: pan-y;
        }
        .tardis-rotor {
          width: min(76vw, 18rem) !important;
          height: min(76vw, 18rem) !important;
          flex: 0 0 auto;
          margin: 0.2rem auto 0;
          pointer-events: auto;
        }
        .tardis-rotor canvas {
          width: 180vw !important;
          height: 120vw !important;
          transform: translate(-50%, -50%) scale(0.68) !important;
          opacity: 0.78;
        }
        .mobile-contact-rail {
          display: flex;
          width: 100%;
          max-width: 100vw;
          gap: 0.7rem;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 0.2rem 0.25rem 0.55rem;
          scroll-snap-type: x proximity;
          transform: translateZ(0);
          -webkit-overflow-scrolling: touch;
          touch-action: pan-x;
        }
        .mobile-contact-rail::-webkit-scrollbar { display: none; }
        .mobile-contact-card {
          min-width: 7.8rem;
          min-height: 4.7rem;
          border-radius: 1.05rem;
          border: 1px solid rgba(34, 211, 238, 0.42);
          background: linear-gradient(145deg, rgba(8, 47, 73, 0.72), rgba(2, 6, 23, 0.82));
          box-shadow: 0 0 26px rgba(34, 211, 238, 0.13), inset 0 0 18px rgba(14, 165, 233, 0.08);
          color: #dff9ff;
          padding: 0.72rem;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          text-align: left;
          scroll-snap-align: start;
          touch-action: pan-x;
          user-select: none;
          -webkit-user-select: none;
        }
        .mobile-contact-card.is-favorite {
          border-color: rgba(250, 204, 21, 0.72);
          box-shadow: 0 0 30px rgba(250, 204, 21, 0.12), inset 0 0 18px rgba(250, 204, 21, 0.08);
        }
        .mobile-add-card {
          border-style: dashed;
          color: rgba(244, 114, 182, 0.95);
          background: linear-gradient(145deg, rgba(80, 7, 36, 0.52), rgba(2, 6, 23, 0.86));
        }
        .mobile-contact-fav {
          font-size: 0.72rem;
          color: #fde68a;
        }
        .mobile-contact-name {
          font-family: 'Audiowide', cursive;
          font-size: 0.88rem;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .mobile-contact-level {
          font-size: 0.62rem;
          color: rgba(125, 211, 252, 0.72);
          text-transform: uppercase;
          letter-spacing: 0.12em;
        }
        .mobile-tab-panel {
          display: block;
          width: 100%;
          min-height: 11.2rem;
          border: 1px solid rgba(14, 165, 233, 0.28);
          border-radius: 1.25rem;
          background: rgba(1, 11, 27, 0.66);
          backdrop-filter: blur(15px);
          padding: 0.85rem;
          box-shadow: 0 0 28px rgba(34, 211, 238, 0.08);
          margin-bottom: 0.85rem;
          touch-action: pan-y;
        }
        .mobile-tab-panel h2 {
          font-family: 'Audiowide', cursive;
          color: #bae6fd;
          font-size: 0.72rem;
          letter-spacing: 0.18em;
          margin-bottom: 0.6rem;
        }
        .mobile-tab-panel input {
          width: 100%;
          min-height: 44px;
          border-radius: 0.9rem;
          border: 1px solid rgba(34, 211, 238, 0.25);
          background: rgba(0, 0, 0, 0.45);
          color: white;
          padding: 0.5rem 0.75rem;
          margin-bottom: 0.65rem;
          outline: none;
        }
        .mobile-directory-list {
          display: flex;
          flex-direction: column;
          gap: 0.48rem;
          max-height: none;
          overflow: visible;
          transform: translateZ(0);
          touch-action: pan-y;
        }
        .mobile-directory-row,
        .mobile-event-row,
        .mobile-settings-button,
        .mobile-anchor-grid button {
          min-height: 44px;
          width: 100%;
          border-radius: 0.95rem;
          border: 1px solid rgba(59, 130, 246, 0.28);
          background: rgba(15, 23, 42, 0.68);
          color: #dbeafe;
          padding: 0.62rem 0.75rem;
          text-align: left;
          touch-action: pan-y;
        }
        .mobile-directory-row div {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.5rem;
        }
        .mobile-directory-row span,
        .mobile-directory-row small,
        .mobile-event-row span,
        .mobile-anchor-grid span {
          font-size: 0.64rem;
          color: rgba(147, 197, 253, 0.72);
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }
        .mobile-anchor-grid {
          display: grid;
          grid-template-columns: 1fr;
          gap: 0.5rem;
        }
        .mobile-anchor-grid button {
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }
        .mobile-panel-copy {
          color: rgba(191, 219, 254, 0.72);
          font-size: 0.78rem;
          line-height: 1.55;
          margin-bottom: 0.7rem;
        }
        .mobile-event-row {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 0.5rem;
        }
        .mobile-settings-button {
          display: block;
          margin-bottom: 0.55rem;
          color: #a5f3fc;
        }
        .mobile-bottom-dock {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 37;
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 0.35rem;
          padding: 0.5rem 0.75rem calc(0.55rem + env(safe-area-inset-bottom));
          background: linear-gradient(180deg, rgba(1, 10, 22, 0.2), rgba(1, 8, 20, 0.94));
          border-top: 1px solid rgba(34, 211, 238, 0.2);
          backdrop-filter: blur(18px);
        }
        .mobile-bottom-dock button {
          min-height: 44px;
          border-radius: 0.95rem;
          color: rgba(186, 230, 253, 0.8);
          background: rgba(8, 47, 73, 0.28);
          border: 1px solid rgba(14, 165, 233, 0.15);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-size: 1.05rem;
        }
        .mobile-bottom-dock button span {
          font-size: 0.6rem;
          margin-top: 0.08rem;
        }
        .mobile-bottom-dock button.active {
          color: white;
          border-color: rgba(34, 211, 238, 0.65);
          background: rgba(14, 165, 233, 0.25);
          box-shadow: 0 0 18px rgba(34, 211, 238, 0.18);
        }
        .mobile-incoming-screen,
        .mobile-active-call-screen {
          position: fixed;
          inset: 0;
          z-index: 44;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding: calc(1.2rem + env(safe-area-inset-top)) 1.25rem calc(1.35rem + env(safe-area-inset-bottom));
          background: radial-gradient(circle at 50% 32%, rgba(14, 165, 233, 0.28), rgba(0,0,0,0.92) 54%, rgba(0,0,0,1));
          overflow-x: hidden;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          text-align: center;
          touch-action: pan-y;
        }
        .mobile-incoming-screen {
          animation: incoming-vibrate 1.1s linear infinite;
          justify-content: center;
        }
        .mobile-active-call-screen {
          padding-bottom: calc(5.3rem + env(safe-area-inset-bottom));
        }
        .mobile-incoming-pulse {
          position: absolute;
          width: 72vw;
          aspect-ratio: 1;
          border-radius: 999px;
          border: 1px solid rgba(248, 113, 113, 0.45);
          box-shadow: 0 0 70px rgba(239, 68, 68, 0.28), inset 0 0 50px rgba(14, 165, 233, 0.08);
          animation: pulse-light 2s ease-in-out infinite;
        }
        .mobile-eyebrow {
          color: #67e8f9;
          text-transform: uppercase;
          letter-spacing: 0.28em;
          font-size: 0.72rem;
          margin-bottom: 1rem;
          z-index: 1;
        }
        .mobile-call-avatar {
          z-index: 1;
          width: 7.4rem;
          height: 7.4rem;
          border-radius: 999px;
          border: 2px solid rgba(34, 211, 238, 0.78);
          background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.2), rgba(14,165,233,0.24), rgba(2,6,23,0.92));
          box-shadow: 0 0 48px rgba(34, 211, 238, 0.32);
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'Audiowide', cursive;
          font-size: 3.1rem;
          color: white;
          margin-bottom: 1rem;
        }
        .mobile-call-avatar-red {
          border-color: rgba(248, 113, 113, 0.86);
          box-shadow: 0 0 48px rgba(239, 68, 68, 0.3);
        }
        .mobile-incoming-screen h2,
        .mobile-active-call-screen h2 {
          z-index: 1;
          font-family: 'Audiowide', cursive;
          font-size: clamp(1.7rem, 8vw, 2.4rem);
          color: white;
          text-shadow: 0 0 22px rgba(34, 211, 238, 0.45);
        }
        .mobile-identity-line,
        .mobile-crisis-copy {
          z-index: 1;
          color: rgba(219, 234, 254, 0.76);
          font-size: 0.82rem;
          margin-top: 0.5rem;
          line-height: 1.5;
        }
        .mobile-current-location,
        .mobile-crisis-panel {
          z-index: 1;
          width: 100%;
          max-width: 22rem;
          border: 1px solid rgba(34, 211, 238, 0.25);
          border-radius: 1.25rem;
          background: rgba(2, 6, 23, 0.64);
          padding: 0.8rem;
          margin-top: 1rem;
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }
        .mobile-current-location span,
        .mobile-crisis-panel span,
        .mobile-crisis-panel small {
          color: rgba(125, 211, 252, 0.7);
          font-size: 0.64rem;
          text-transform: uppercase;
          letter-spacing: 0.16em;
        }
        .mobile-current-location strong,
        .mobile-crisis-panel strong {
          color: #f8fafc;
          font-size: 0.88rem;
          line-height: 1.35;
        }
        .mobile-answer-slider {
          z-index: 1;
          width: 100%;
          max-width: 22rem;
          min-height: 44px;
          border-radius: 999px;
          border: 1px solid rgba(255,255,255,0.16);
          background: linear-gradient(90deg, rgba(239,68,68,0.28), rgba(34,211,238,0.18), rgba(34,197,94,0.28));
          color: rgba(255,255,255,0.82);
          display: flex;
          align-items: center;
          justify-content: center;
          margin-top: 1.35rem;
          font-size: 0.75rem;
          letter-spacing: 0.08em;
        }
        .mobile-call-actions {
          z-index: 1;
          display: grid;
          grid-template-columns: 1fr 1fr;
          width: 100%;
          max-width: 21rem;
          gap: 1rem;
          margin-top: 1.05rem;
        }
        .mobile-call-actions button {
          min-height: 54px;
          border-radius: 999px;
          font-family: 'Audiowide', cursive;
          letter-spacing: 0.08em;
        }
        .mobile-decline { background: #991b1b; color: white; }
        .mobile-answer { background: #16a34a; color: white; }
        .mobile-waveform {
          display: flex;
          gap: 0.42rem;
          align-items: center;
          justify-content: center;
          height: 3.8rem;
          margin: 0.3rem 0;
        }
        .mobile-waveform span {
          width: 0.45rem;
          height: 2.8rem;
          border-radius: 999px;
          background: linear-gradient(180deg, #67e8f9, #2563eb);
          animation: mobile-wave 0.88s ease-in-out infinite;
          transform-origin: center;
        }
        .mobile-waveform span:nth-child(2) { animation-delay: 0.12s; }
        .mobile-waveform span:nth-child(3) { animation-delay: 0.24s; }
        .mobile-waveform span:nth-child(4) { animation-delay: 0.36s; }
        .mobile-waveform span:nth-child(5) { animation-delay: 0.48s; }
        .mobile-caption-toolbar {
          display: flex;
          gap: 0.35rem;
          width: 100%;
          max-width: 22rem;
          margin-top: 0.8rem;
        }
        .mobile-caption-toolbar button {
          flex: 1;
          min-height: 38px;
          border-radius: 999px;
          border: 1px solid rgba(34, 211, 238, 0.22);
          background: rgba(2, 6, 23, 0.62);
          color: rgba(186, 230, 253, 0.66);
          font-size: 0.62rem;
          text-transform: uppercase;
        }
        .mobile-caption-toolbar button.active {
          color: white;
          background: rgba(14, 165, 233, 0.28);
          border-color: rgba(34, 211, 238, 0.66);
        }
        .mobile-captions {
          width: 100%;
          max-width: 22rem;
          min-height: 6.5rem;
          max-height: 32dvh;
          overflow-y: auto;
          border-radius: 1rem;
          border: 1px solid rgba(34, 211, 238, 0.18);
          background: rgba(0, 0, 0, 0.38);
          margin-top: 0.55rem;
          padding: 0.7rem;
          text-align: left;
          transform: translateZ(0);
        }
        .mobile-captions p {
          font-size: 0.76rem;
          line-height: 1.45;
          margin-bottom: 0.45rem;
        }
        .mobile-captions span { color: #67e8f9; }
        .mobile-captions em { display: block; color: rgba(254, 240, 138, 0.75); font-style: normal; font-size: 0.68rem; margin-top: 0.18rem; }
        .from-user span { color: #f9a8d4; }
        .mobile-caption-placeholder { color: rgba(148, 163, 184, 0.82); text-align: center; }
        .mobile-call-control-dock {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 45;
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 0.45rem;
          padding: 0.55rem 0.75rem calc(0.7rem + env(safe-area-inset-bottom));
          background: rgba(2, 6, 23, 0.92);
          border-top: 1px solid rgba(34, 211, 238, 0.18);
          backdrop-filter: blur(18px);
        }
        .mobile-call-control-dock button {
          min-height: 50px;
          border-radius: 1rem;
          background: rgba(15, 23, 42, 0.86);
          border: 1px solid rgba(148, 163, 184, 0.18);
          color: white;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 0.1rem;
        }
        .mobile-call-control-dock button span { font-size: 0.58rem; text-transform: uppercase; }
        .mobile-call-control-dock .hangup { background: rgba(153, 27, 27, 0.88); }
        .mobile-scroll-spacer {
          display: block;
          width: 100%;
          height: calc(0.8rem + env(safe-area-inset-bottom));
          flex: 0 0 auto;
        }
        .absolute.inset-0.z-50:not(.crt-overlay),
        .fixed.inset-0.z-50 {
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
        }
        @media (prefers-reduced-motion: reduce) {
          .mobile-incoming-screen { animation: none; }
        }
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",

    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
